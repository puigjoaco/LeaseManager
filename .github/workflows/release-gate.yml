name: Release Gate

on:
  workflow_dispatch:
    inputs:
      run_public_smoke:
        description: Run opt-in public smoke against authorized external frontend/backend URLs
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      frontend_url:
        description: Public frontend URL for manual smoke
        required: false
        default: "https://leasemanager-backoffice.vercel.app/"
      api_base_url:
        description: Public backend API base URL for manual smoke
        required: false
        default: "https://surprising-balance-production.up.railway.app"
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            scripts/package-lock.json

      - name: Build backend virtualenv
        working-directory: backend
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        shell: pwsh
        run: npm ci

      - name: Install smoke dependencies
        if: github.event_name == 'workflow_dispatch' && inputs.run_public_smoke == 'true'
        working-directory: scripts
        shell: pwsh
        run: npm ci

      - name: Install Playwright browser
        if: github.event_name == 'workflow_dispatch' && inputs.run_public_smoke == 'true'
        working-directory: scripts
        shell: pwsh
        run: npx playwright install chromium

      - name: Disable Python traceback annotations for acceptance tests
        shell: pwsh
        run: |
          # setup-python registers a broad Python traceback matcher. The release
          # gate intentionally keeps rollback tracebacks in logs for tests that
          # assert transaction safety, but the exit code remains the source of
          # truth for real failures.
          Write-Output "::remove-matcher owner=python::"

      - name: Run deterministic release gate
        shell: pwsh
        run: .\scripts\run-acceptance-workflows.ps1 -SkipSmoke

      - name: Run public smoke against external environment
        if: github.event_name == 'workflow_dispatch' && inputs.run_public_smoke == 'true'
        shell: pwsh
        run: .\scripts\run-acceptance-workflows.ps1 -OnlySmoke -FrontendUrl "${{ inputs.frontend_url }}" -ApiBaseUrl "${{ inputs.api_base_url }}"
